{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ host }}</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1e1e1e;
      }
      #terminal {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="terminal"></div>
    <script type="module">
      const { init, Terminal, FitAddon } =
        await import("{% static 'core/vendor/ghostty-web/ghostty-web.js' %}");
      await init("{% static 'core/vendor/ghostty-web/ghostty-vt.wasm' %}");

      const hostId = "{{ host.pk }}";
      const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
      const wsUrl = `${proto}//${window.location.host}/ws/ssh/${hostId}/`;

      const container = document.getElementById("terminal");

      const term = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: 'Monaco, Menlo, "Courier New", monospace',
        scrollback: 10000,
        theme: {
          background: "#1e1e1e",
          foreground: "#d4d4d4",
        },
      });

      const fitAddon = new FitAddon();
      term.loadAddon(fitAddon);
      term.open(container);
      fitAddon.fit();

      new ResizeObserver(function () {
        fitAddon.fit();
      }).observe(container);

      const ws = new WebSocket(wsUrl);
      ws.binaryType = "arraybuffer";

      ws.onopen = function () {
        term.onData(function (data) {
          ws.send(data);
        });

        term.onResize(function (size) {
          ws.send(
            JSON.stringify({
              type: "resize",
              cols: size.cols,
              rows: size.rows,
            }),
          );
        });

        ws.send(
          JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows }),
        );
      };

      ws.onmessage = function (event) {
        if (typeof event.data === "string") {
          try {
            const msg = JSON.parse(event.data);
            if (msg.error) {
              term.write(`\r\nError: ${msg.error}\r\n`);
              return;
            }
          } catch {
            // Not JSON, treat as terminal data
          }
          term.write(event.data);
        } else {
          const decoder = new TextDecoder();
          term.write(decoder.decode(event.data));
        }
      };

      ws.onclose = function () {
        term.write("\r\n[Connection closed]\r\n");
        document.title = "[closed] " + document.title;
      };
    </script>
  </body>
</html>
